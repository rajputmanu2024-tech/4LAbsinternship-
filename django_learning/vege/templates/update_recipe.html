{% extends "common.html" %}

{% block content %}

<div class="container mt-5">

    <form class="col-6 mx-auto card p-3 shadow-lg"
          method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        <h2>Update Recipe</h2>
        <hr>

        <div class="mb-3">
            <label class="form-label">Recipe Name</label>
            <input
                type="text"
                name="recipe_name"
                class="form-control"
                value="{{ recipe.recipe_name }}"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Recipe Description</label>
            <textarea
                name="recipe_description"
                class="form-control"
                rows="5"
                required>{{ recipe.recipe_description }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Current Image</label>
            <br>

            {% if recipe.recipe_image %}
                <img src="{{ recipe.recipe_image.url }}"
                     width="200"
                     class="mb-3">
            {% else %}
                <p>No Image Uploaded</p>
            {% endif %}
        </div>

        <div class="mb-3">
            <label class="form-label">Choose New Image</label>
            <input
                type="file"
                name="recipe_image"
                class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">
            Update Recipe
        </button>

        <a href="{% url 'recipes' %}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
